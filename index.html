<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0B0F1A" />
    <link rel="manifest" href="manifest.json" />
    <title>Vertex Chamber | Futuristic Splash</title>
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: "Share Tech Mono", "Orbitron", "Rajdhani", monospace;
        height: 100vh;
        width: 100vw;
      }

      /* Main splash container */
      .splash-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #03050b 0%, #000000 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition:
          opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1),
          transform 0.9s ease;
        opacity: 1;
        transform: scale(1);
      }

      /* Fade-out + zoom transition (applied after timer) */
      .splash-container.fade-out {
        opacity: 0;
        transform: scale(1.2);
        pointer-events: none;
      }

      /* Canvas for particles + neural lines + glitch scanlines */
      #bg-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        pointer-events: none;
      }

      /* Main content wrapper */
      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 1.5rem;
      }

      /* Logo container with pulse & aura */
      .logo-wrapper {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 2rem;
        animation: breathePulse 2.4s ease-in-out infinite;
        cursor: pointer;
      }

      /* Custom logo image styling */
      .vertex-logo-img {
        max-width: 280px;
        width: auto;
        height: auto;
        filter: drop-shadow(0 0 12px rgba(0, 160, 255, 0.7))
          drop-shadow(0 0 25px rgba(138, 43, 226, 0.5));
        transition: filter 0.3s ease;
        display: block;
      }

      /* Responsive logo sizing */
      @media (max-width: 550px) {
        .vertex-logo-img {
          max-width: 180px;
        }
      }

      /* Glow aura that expands/fades with breathing sync */
      .aura-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 130%;
        height: 180%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(0, 255, 255, 0.35) 0%,
          rgba(80, 60, 210, 0) 80%
        );
        border-radius: 50%;
        filter: blur(28px);
        opacity: 0.6;
        z-index: -1;
        pointer-events: none;
        animation: auraPulse 2.4s ease-in-out infinite;
      }

      /* additional subtle glow ring */
      .glow-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 140%;
        height: 160%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        box-shadow: 0 0 40px rgba(0, 200, 255, 0.3);
        background: transparent;
        border: 1px solid rgba(0, 255, 255, 0.2);
        animation: ringBreathing 2.4s infinite;
      }

      /* timer + progress area */
      .timer-panel {
        margin-top: 2rem;
        width: 280px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
      }

      .digital-timer {
        font-size: 3.2rem;
        font-family: "Orbitron", "Share Tech Mono", monospace;
        font-weight: 600;
        letter-spacing: 6px;
        background: linear-gradient(145deg, #b0f0ff, #a06eff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 8px cyan;
        backdrop-filter: blur(2px);
      }

      /* progress bar container */
      .progress-bar-container {
        width: 100%;
        height: 4px;
        background: rgba(20, 30, 55, 0.7);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 6px rgba(0, 255, 255, 0.3);
        backdrop-filter: blur(2px);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00ccff, #b266ff, #ff44cc);
        border-radius: 8px;
        box-shadow: 0 0 8px #00aaff;
        transition: width 0.1s linear;
      }

      /* circular loader alternative (optional mini ring) */
      .circular-loader {
        margin-top: 6px;
        width: 42px;
        height: 42px;
        border: 2px solid rgba(0, 200, 255, 0.3);
        border-top: 2px solid #0af;
        border-right: 2px solid #c05eff;
        border-radius: 50%;
        animation: spinLoader 1s linear infinite;
        opacity: 0.85;
      }

      /* holographic text lines */
      .status-text {
        margin-top: 20px;
        font-size: 0.85rem;
        font-family: "Share Tech Mono", monospace;
        letter-spacing: 2px;
        color: rgba(100, 210, 255, 0.8);
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 12px;
        border-radius: 30px;
        backdrop-filter: blur(3px);
        border-left: 2px solid cyan;
        border-right: 2px solid magenta;
        transition: opacity 0.4s;
      }

      /* Sponsor / Powered By section - near bottom */
      .sponsor-section {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        z-index: 20;
        font-family: "Share Tech Mono", "Orbitron", monospace;
        letter-spacing: 1.5px;
        pointer-events: none;
      }

      .sponsor-text {
        font-size: 0.75rem;
        color: rgba(120, 180, 255, 0.7);
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        display: inline-block;
        padding: 6px 18px;
        border-radius: 40px;
        border: 1px solid rgba(0, 255, 255, 0.25);
        box-shadow: 0 0 12px rgba(0, 200, 255, 0.2);
        font-weight: 400;
      }

      .sponsor-text strong {
        background: linear-gradient(120deg, #88ddff, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 600;
      }

      /* glitch flicker animation (overlay) */
      .glitch-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 255, 255, 0.02) 0px,
          rgba(255, 0, 255, 0.02) 2px,
          transparent 3px,
          transparent 8px
        );
        pointer-events: none;
        z-index: 20;
        mix-blend-mode: overlay;
        animation: scanMove 8s linear infinite;
      }

      /* data scan lines passing occasionally */
      .data-scan {
        position: absolute;
        top: -10%;
        left: 0;
        width: 100%;
        height: 8px;
        background: linear-gradient(
          90deg,
          transparent,
          cyan,
          #f0f,
          transparent
        );
        filter: blur(2px);
        opacity: 0;
        z-index: 25;
        pointer-events: none;
        animation: scanPass 4s ease-in-out infinite;
      }

      /* holographic fragments UI */
      .hologram-fragments {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 15;
      }

      .fragment {
        position: absolute;
        background: radial-gradient(
          circle,
          rgba(0, 255, 255, 0.5),
          transparent
        );
        width: 60px;
        height: 60px;
        filter: blur(8px);
        opacity: 0;
        animation: fragmentFade 6s infinite;
      }

      /* keyframes */
      @keyframes breathePulse {
        0% {
          transform: scale(0.92);
        }
        50% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(0.92);
        }
      }

      @keyframes auraPulse {
        0% {
          opacity: 0.3;
          transform: translate(-50%, -50%) scale(0.8);
          filter: blur(20px);
        }
        50% {
          opacity: 0.85;
          transform: translate(-50%, -50%) scale(1.3);
          filter: blur(32px);
        }
        100% {
          opacity: 0.3;
          transform: translate(-50%, -50%) scale(0.8);
          filter: blur(20px);
        }
      }

      @keyframes ringBreathing {
        0% {
          opacity: 0.2;
          transform: translate(-50%, -50%) scale(0.9);
          border-width: 1px;
        }
        50% {
          opacity: 0.7;
          transform: translate(-50%, -50%) scale(1.2);
          border-width: 2px;
        }
        100% {
          opacity: 0.2;
          transform: translate(-50%, -50%) scale(0.9);
          border-width: 1px;
        }
      }

      @keyframes spinLoader {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes scanMove {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 30px;
        }
      }

      @keyframes scanPass {
        0% {
          top: -10%;
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        30% {
          opacity: 0.4;
          top: 40%;
        }
        60% {
          opacity: 0.3;
          top: 70%;
        }
        100% {
          top: 110%;
          opacity: 0;
        }
      }

      @keyframes fragmentFade {
        0% {
          opacity: 0;
          transform: translateY(0px) scale(0.5);
        }
        20% {
          opacity: 0.6;
          transform: translateY(-15px) scale(1);
        }
        80% {
          opacity: 0.3;
          transform: translateY(10px) scale(0.9);
        }
        100% {
          opacity: 0;
          transform: translateY(40px) scale(0.4);
        }
      }

      /* Glitch flicker occasional */
      @keyframes glitchFlash {
        0% {
          opacity: 0;
          background: rgba(255, 0, 255, 0);
        }
        2% {
          opacity: 0.2;
          background: rgba(0, 255, 255, 0.1);
        }
        4% {
          opacity: 0;
          background: transparent;
        }
        100% {
          opacity: 0;
        }
      }

      .glitch-instant {
        animation: glitchFlash 0.2s ease-out 2;
      }

      /* responsiveness */
      @media (max-width: 550px) {
        .timer-panel {
          width: 240px;
        }
        .digital-timer {
          font-size: 2.4rem;
          letter-spacing: 3px;
        }
        .sponsor-text {
          font-size: 0.65rem;
          padding: 4px 14px;
        }
      }

      /* hidden utility */
      .hidden-redirect {
        display: none;
      }

      /* placeholder hint for logo (only visible if logo missing) */
      .logo-placeholder-hint {
        position: absolute;
        bottom: -40px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        background: rgba(0, 0, 0, 0.6);
        color: cyan;
        padding: 4px 12px;
        border-radius: 20px;
        white-space: nowrap;
        font-family: monospace;
        pointer-events: none;
        opacity: 0.7;
        z-index: 30;
      }

      /* hide hint when image loads successfully */
      .logo-wrapper.has-logo .logo-placeholder-hint {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="splash-container" id="splashScreen">
      <canvas id="bg-canvas"></canvas>
      <div class="glitch-overlay"></div>
      <div class="data-scan" id="dataScanLine"></div>
      <div class="hologram-fragments" id="fragmentsContainer"></div>

      <div class="content">
        <div class="logo-wrapper" id="logoWrapper">
          <div class="aura-glow"></div>
          <div class="glow-ring"></div>
          <!-- =============================================== -->
          <!-- 🔹 PLACEHOLDER FOR YOUR VERTEX LOGO 🔹 -->
          <!-- Replace the src below with your own logo image path/file -->
          <img
            id="vertexLogoImg"
            class="vertex-logo-img"
            src="Vertex Logo.png"
            alt="Vertex Chamber Logo"
            style="display: none"
          />
          <!-- A simple fallback text logo if no image is provided (will be hidden once valid image loads) -->
          <div id="fallbackTextLogo" class="vertex-logo" style="display: none">
            VERTEX<span style="font-size: 0.5em; vertical-align: super">⚡</span
            ><br />
            <small>CHAMBER</small>
          </div>
          <!-- =============================================== -->
        </div>

        <div class="timer-panel">
          <div class="digital-timer" id="timerDisplay">0.00</div>
          <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="circular-loader"></div>
        </div>

        <div class="status-text" id="statusMsg">
          Initializing Vertex Systems...
        </div>
      </div>

      <!-- Sponsor section: "Powered By JSL FastLine" at the bottom -->
      <div class="sponsor-section">
        <div class="sponsor-text">
          ⚡ <strong>Powered By JSL FastLine</strong> ⚡
        </div>
      </div>
    </div>

    <script src="pwa.js"></script>
    <script>
      (function () {
        // ---- CANVAS BACKGROUND: particles + neural network lines
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");
        let width, height;
        let particles = [];
        let animationFrame;

        // particle settings
        const PARTICLE_COUNT = 120;

        class Particle {
          constructor(x, y, vx, vy, size) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.size = size;
            this.alpha = 0.4 + Math.random() * 0.5;
            this.color = `hsla(${190 + Math.random() * 80}, 80%, 65%, ${this.alpha})`;
          }
          update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#0af";
            ctx.fill();
          }
        }

        function initParticles() {
          particles = [];
          for (let i = 0; i < PARTICLE_COUNT; i++) {
            let x = Math.random() * width;
            let y = Math.random() * height;
            let vx = (Math.random() - 0.5) * 0.25;
            let vy = (Math.random() - 0.5) * 0.2;
            let size = 1.2 + Math.random() * 2.5;
            particles.push(new Particle(x, y, vx, vy, size));
          }
        }

        // draw neural connections (dynamic lines based on distance)
        function drawNeuralLines() {
          if (particles.length < 2) return;
          ctx.beginPath();
          ctx.lineWidth = 0.8;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.hypot(dx, dy);
              if (dist < 95) {
                const opacity =
                  (1 - dist / 95) * 0.25 +
                  Math.sin(Date.now() * 0.001 + i) * 0.05;
                ctx.strokeStyle = `rgba(80, 180, 255, ${opacity * 0.7})`;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }
          // additional floating neon grid lines (moving)
          ctx.beginPath();
          for (let k = 0; k < 15; k++) {
            let t = (Date.now() * 0.0006 + k) % (Math.PI * 2);
            let x1 = (Math.sin(t) * 80 + Math.cos(k) * 70) % width;
            let y1 = (Math.cos(t * 1.3) * 50 + Math.sin(k * 2) * 60) % height;
            let x2 = (x1 + Math.sin(t + 2) * 120) % width;
            let y2 = (y1 + Math.cos(t * 1.8) * 100) % height;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `rgba(0, 210, 255, 0.12)`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }

        function animateBackground() {
          if (!ctx) return;
          ctx.clearRect(0, 0, width, height);
          ctx.shadowBlur = 0;
          const grad = ctx.createLinearGradient(0, 0, width, height);
          grad.addColorStop(0, "rgba(0, 0, 0, 0.85)");
          grad.addColorStop(1, "rgba(5, 5, 20, 0.9)");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, width, height);

          for (let p of particles) {
            p.update();
            p.draw();
          }
          drawNeuralLines();

          // additional glowing dots
          for (let i = 0; i < 30; i++) {
            let x = (Date.now() * 0.2 + i * 47) % width;
            let y = (Math.sin(Date.now() * 0.0015 + i) * 70 + 150) % height;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 200, 255, ${0.2 + Math.sin(Date.now() * 0.003 + i) * 0.1})`;
            ctx.fill();
          }
          animationFrame = requestAnimationFrame(animateBackground);
        }

        function resizeCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          initParticles();
        }

        // ---- Holographic fragments generator
        function createFragments() {
          const container = document.getElementById("fragmentsContainer");
          container.innerHTML = "";
          for (let i = 0; i < 8; i++) {
            const frag = document.createElement("div");
            frag.classList.add("fragment");
            const leftPos = 10 + Math.random() * 80;
            const topPos = 10 + Math.random() * 80;
            const delay = Math.random() * 8;
            const duration = 4 + Math.random() * 5;
            frag.style.left = `${leftPos}%`;
            frag.style.top = `${topPos}%`;
            frag.style.width = `${20 + Math.random() * 45}px`;
            frag.style.height = `${20 + Math.random() * 45}px`;
            frag.style.animation = `fragmentFade ${duration}s infinite`;
            frag.style.animationDelay = `${delay}s`;
            frag.style.background = `radial-gradient(circle, rgba(${100 + Math.random() * 155}, ${100 + Math.random() * 155}, 255, 0.4), transparent)`;
            container.appendChild(frag);
          }
        }

        // ---- random glitch flicker
        let glitchInterval;
        function startGlitchFlicker() {
          const splash = document.getElementById("splashScreen");
          glitchInterval = setInterval(() => {
            if (Math.random() > 0.75) {
              splash.classList.add("glitch-instant");
              setTimeout(() => splash.classList.remove("glitch-instant"), 150);
              const scan = document.getElementById("dataScanLine");
              scan.style.animation = "none";
              scan.offsetHeight;
              scan.style.animation = "scanPass 4s ease-in-out infinite";
            }
          }, 2800);
        }

        // rotating status messages
        const statusMessages = [
          "Initializing Vertex Systems...",
          "Loading Intelligence Modules...",
          "Synchronizing Neural Grid...",
          "Calibrating Holographic UI...",
          "Quantum Handshake Active...",
          "Awakening Chamber Core...",
        ];
        let msgIndex = 0;
        let msgInterval;
        function rotateStatusMessages() {
          const statusDiv = document.getElementById("statusMsg");
          msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % statusMessages.length;
            if (statusDiv) {
              statusDiv.style.opacity = "0.5";
              setTimeout(() => {
                statusDiv.textContent = statusMessages[msgIndex];
                statusDiv.style.opacity = "1";
              }, 150);
            }
          }, 1800);
        }

        // ---- TIMER SYSTEM 0->5 secs + redirection
        let startTime = null;
        let timerActive = true;
        let animationTimer = null;
        const timerDisplay = document.getElementById("timerDisplay");
        const progressFill = document.getElementById("progressFill");
        const splashContainer = document.getElementById("splashScreen");

        function updateTimerAndProgress() {
          if (!timerActive) return;
          const now = performance.now() / 1000;
          const elapsed = now - startTime;
          let seconds = Math.min(elapsed, 5.0);
          if (seconds >= 5.0) {
            if (timerActive) {
              timerActive = false;
              finishAndRedirect();
            }
            return;
          }
          timerDisplay.textContent = seconds.toFixed(2);
          const percent = (seconds / 5.0) * 100;
          progressFill.style.width = `${percent}%`;
          animationTimer = requestAnimationFrame(function tick() {
            if (timerActive) updateTimerAndProgress();
          });
        }

        function finishAndRedirect() {
          if (window._redirectTriggered) return;
          window._redirectTriggered = true;
          if (msgInterval) clearInterval(msgInterval);
          if (glitchInterval) clearInterval(glitchInterval);
          if (animationTimer) cancelAnimationFrame(animationTimer);
          splashContainer.classList.add("fade-out");
          const logoWrap = document.getElementById("logoWrapper");
          if (logoWrap) {
            logoWrap.style.transition =
              "transform 0.5s cubic-bezier(0.2, 0.9, 0.8, 1.2), opacity 0.4s";
            logoWrap.style.transform = "scale(1.6)";
            logoWrap.style.opacity = "0";
          }
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1100);
        }

        // ----- LOGO HANDLING: allow user to upload custom logo or use image src
        const logoImg = document.getElementById("vertexLogoImg");
        const fallbackDiv = document.getElementById("fallbackTextLogo");
        const logoWrapper = document.getElementById("logoWrapper");

        // Function to set custom logo via file or URL. For flexibility, we add a data attribute:
        // By default we show a hint to replace the src.
        // Since user said "leave a place for uploading vertex logo that i will put"
        // we create an invisible file input for easy upload? but simpler: provide an elegant placeholder + console hint.
        // We'll also allow user to replace the 'src' attribute manually OR upload via click.

        // Create an upload button or click-to-upload feature (convenient)
        const uploadHint = document.createElement("div");
        uploadHint.className = "logo-placeholder-hint";
        uploadHint.innerHTML = "📁 Click to upload Vertex Logo (PNG/SVG)";
        uploadHint.style.cursor = "pointer";
        uploadHint.style.pointerEvents = "auto";
        logoWrapper.appendChild(uploadHint);

        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/png,image/jpeg,image/svg+xml,image/webp";
        fileInput.style.display = "none";
        document.body.appendChild(fileInput);

        // Function to set logo from image URL or file
        function setLogoImage(fileOrUrl, isFile = false) {
          if (isFile && fileOrUrl instanceof File) {
            const reader = new FileReader();
            reader.onload = function (e) {
              logoImg.src = e.target.result;
              logoImg.style.display = "block";
              fallbackDiv.style.display = "none";
              logoWrapper.classList.add("has-logo");
              if (uploadHint) uploadHint.style.display = "none";
            };
            reader.readAsDataURL(fileOrUrl);
          } else if (typeof fileOrUrl === "string" && fileOrUrl.trim() !== "") {
            logoImg.src = fileOrUrl;
            logoImg.onload = () => {
              logoImg.style.display = "block";
              fallbackDiv.style.display = "none";
              logoWrapper.classList.add("has-logo");
              if (uploadHint) uploadHint.style.display = "none";
            };
            logoImg.onerror = () => {
              console.warn("Logo failed to load, using fallback text.");
              fallbackDiv.style.display = "flex";
              logoImg.style.display = "none";
            };
          }
        }

        // trigger file upload on hint click
        uploadHint.addEventListener("click", (e) => {
          e.stopPropagation();
          fileInput.click();
        });

        fileInput.addEventListener("change", (e) => {
          if (fileInput.files && fileInput.files[0]) {
            setLogoImage(fileInput.files[0], true);
          }
        });

        // For initial demo: show fallback text until user uploads or sets src.
        // But we also provide an attribute so that if you replace the img src manually it works.
        // Check if img src is empty: show fallback and hint
        if (
          !logoImg.src ||
          logoImg.src === "" ||
          logoImg.src.indexOf("null") > -1
        ) {
          fallbackDiv.style.display = "flex";
          logoImg.style.display = "none";
        } else {
          logoImg.onload = () => {
            logoImg.style.display = "block";
            fallbackDiv.style.display = "none";
            logoWrapper.classList.add("has-logo");
            if (uploadHint) uploadHint.style.display = "none";
          };
          logoImg.onerror = () => {
            fallbackDiv.style.display = "flex";
            logoImg.style.display = "none";
          };
        }

        // also allow developer to set custom logo via console or manual edit: e.g., vertexLogoImg.src = "yourlogo.png"
        // the breathing pulse animation is already applied to .logo-wrapper, so both text and image will scale together

        // initializing the entire sequence
        function init() {
          resizeCanvas();
          window.addEventListener("resize", () => {
            resizeCanvas();
            initParticles();
            createFragments();
          });
          animateBackground();
          createFragments();
          startGlitchFlicker();
          rotateStatusMessages();

          startTime = performance.now() / 1000;
          timerActive = true;
          updateTimerAndProgress();
        }

        init();
      })();
    </script>
  </body>
</html>
